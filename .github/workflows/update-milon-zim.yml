name: Update Milon Klei Kodesh ZIM

# Rebuilds milon-klei-kodesh.zim from the live KleiKodeshProject Dictionary.db
# whenever it changes, re-approves the fresh file on the plugin's allowlist
# (by exact fingerprint — see tools/update_allowlist.py), uploads it to the
# downloads release (YairDaniel11/otzaria-zim-plugin, tag v0.5.0), and pushes
# a new tag so release.yml builds and publishes the plugin update.

on:
  schedule:
    - cron: '30 3 */3 * *'   # every 3 days at 03:30 UTC (offset from the wiki job)
  workflow_dispatch: {}

permissions:
  contents: write

env:
  SOURCE_REPO: KleiKodesh/KleiKodeshProject
  SOURCE_PATH: KitveiHakodesh/CSharpBackend/KitveiHakodeshService/Dictionary/Dictionary.db
  DOWNLOADS_REPO: YairDaniel11/otzaria-zim-plugin
  DOWNLOADS_TAG: v0.5.0

jobs:
  update-milon-zim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch the live Dictionary.db
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/$SOURCE_REPO/contents/$SOURCE_PATH" --jq '.sha' > .db-sha-new
          curl -sL -o Dictionary.db "https://raw.githubusercontent.com/$SOURCE_REPO/master/$SOURCE_PATH"

      - name: Check for changes since the last run
        id: check
        run: |
          NEW_SHA=$(cat .db-sha-new)
          LAST_SHA=$(cat .milon-last-sha 2>/dev/null || true)
          if [ "$NEW_SHA" = "$LAST_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dictionary.db unchanged since last run ($NEW_SHA) — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Dictionary.db changed: $LAST_SHA -> $NEW_SHA"
          fi

      - name: Set up Python
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        if: steps.check.outputs.changed == 'true'
        run: pip install libzim

      - name: Build milon-klei-kodesh.zim
        if: steps.check.outputs.changed == 'true'
        run: python tools/build_milon_zim.py --db Dictionary.db --output milon-klei-kodesh.zim

      - name: Update the allowlist fingerprint
        if: steps.check.outputs.changed == 'true'
        env:
          ZIM_ALLOWLIST_SALT: ${{ secrets.ZIM_ALLOWLIST_SALT }}
        run: python tools/update_allowlist.py --zim milon-klei-kodesh.zim --app-js js/app.js --entries-key milon

      - name: Upload the new ZIM to the downloads release
        # The downloads release lives in a different repo (the personal fork
        # used to host large ZIM downloads), so the in-repo GITHUB_TOKEN can't
        # reach it — needs a PAT with access to that repo instead.
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.DOWNLOADS_REPO_TOKEN }}
        run: gh release upload "$DOWNLOADS_TAG" milon-klei-kodesh.zim --repo "$DOWNLOADS_REPO" --clobber

      - name: Bump the patch version
        if: steps.check.outputs.changed == 'true'
        id: bump
        run: |
          python - <<'PY'
          import json
          path = 'manifest.json'
          with open(path, encoding='utf-8') as f:
              m = json.load(f)
          major, minor, patch = (int(x) for x in m['version'].split('.'))
          m['version'] = '%d.%d.%d' % (major, minor, patch + 1)
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(m, f, ensure_ascii=False, indent=2)
              f.write('\n')
          print(m['version'])
          PY
          echo "new_version=$(python -c "import json;print(json.load(open('manifest.json'))['version'])")" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        if: steps.check.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "otzaria-milon-bot"
          git config user.email "actions@users.noreply.github.com"
          cp .db-sha-new .milon-last-sha
          git add js/app.js manifest.json tools/zim-allowlist-entries.json .milon-last-sha
          git commit -m "milon auto-update: rebuild milon-klei-kodesh.zim from KleiKodeshProject Dictionary.db"
          git tag "v$NEW_VERSION"
          git push origin main
          git push origin "v$NEW_VERSION"

      - name: Trigger the plugin release build
        # A push made with the default GITHUB_TOKEN never triggers other
        # workflows (GitHub's anti-recursion rule), so the tag pushed above
        # would otherwise never reach release.yml's `on: push: tags:` trigger.
        # Dispatch it explicitly instead.
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: gh workflow run release.yml --ref main -f tag="v$NEW_VERSION"
