<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קורא ZIM</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <button id="open-btn" class="btn header-open">פתח קובץ ZIM…</button>
      <span class="title" id="archive-name">קורא קבצי ZIM</span>
      <span class="hdr-spacer" aria-hidden="true"></span>
    </header>

    <div class="toolbar">
      <button id="sidebar-toggle" class="secondary icon-btn" title="הצג/הסתר תוכן עניינים / תוצאות" hidden>☰</button>
      <input type="file" id="zim-file" accept=".zim,.zimaa,.zimab" />
      <select id="archive-select" class="archive-select" title="קבצים פתוחים" hidden></select>
      <button id="archive-remove" class="secondary icon-btn" title="הסר קובץ מהרשימה" hidden>✕</button>
      <input type="search" id="search-box" placeholder="הקלד מילה לחיפוש" disabled autocomplete="off" />
      <button id="search-btn" disabled>חיפוש בתוכן</button>
      <button id="find-in-page" class="secondary" title="חיפוש בתוך הדף הפתוח" disabled>חפש בדף</button>
      <button id="home-btn" class="secondary" disabled>דף הבית</button>
      <button id="downloads-toggle" class="secondary">⬇ מאגרים להורדה</button>
    </div>

    <div class="drawer-overlay" id="drawer-overlay" hidden></div>
    <aside class="download-drawer" id="download-drawer" hidden aria-hidden="true">
      <div class="drawer-head">
        <span class="drawer-title">מאגרים להורדה</span>
        <button id="drawer-close" class="drawer-close" title="סגור" aria-label="סגור">✕</button>
      </div>
      <div class="drawer-body">
        <p class="drawer-hint">לחיצה תוריד את הקובץ ישירות (מתוך GitHub Releases).</p>
        <button id="dl-milon" class="drawer-dl-btn">
          <span class="dl-name">⬇ ויקימילון כלי קודש</span>
          <span class="dl-size">~6.4MB</span>
        </button>
        <button id="dl-sugya" class="drawer-dl-btn">
          <span class="dl-name">⬇ ויקיסוגיה</span>
          <span class="dl-size">~5.5MB</span>
        </button>
        <button id="dl-yeshiva" class="drawer-dl-btn">
          <span class="dl-name">⬇ ויקישיבה</span>
          <span class="dl-size">~135MB</span>
        </button>
        <button id="dl-otzaria" class="drawer-dl-btn">
          <span class="dl-name">⬇ ויקיאוצריא</span>
          <span class="dl-size">~0.3MB</span>
        </button>
      </div>
    </aside>

    <main>
      <aside id="sidebar" hidden>
        <div class="sidebar-head">
          <span id="sidebar-title">תוכן העניינים</span>
          <button id="results-scope" class="sidebar-mini" title="חיפוש גם בתוך תוכן הנושאים (ולא רק בכותרות)" hidden>☐ בתוכן</button>
          <button id="sidebar-clear" class="sidebar-mini" title="ביטול חיפוש וחזרה לתוכן העניינים" hidden>↩ ביטול</button>
        </div>
        <div id="suggestions"></div>
        <div id="toc-section" hidden>
          <button id="toc-toggle" class="toc-subhead" title="הצג/הסתר ניווט לפי כותרות הדף">
            <span id="toc-arrow" class="toc-arrow">▸</span><span>ניווט בכותרות הדף</span>
          </button>
          <div id="toc-list" hidden></div>
        </div>
      </aside>
      <section id="article-pane">
        <div id="match-nav" class="match-nav" hidden>
          <input type="search" id="match-input" class="match-input" placeholder="חיפוש בדף" autocomplete="off" />
          <span id="match-count">0/0</span>
          <button id="match-prev" title="המופע הקודם" aria-label="הקודם">▲</button>
          <button id="match-next" title="המופע הבא" aria-label="הבא">▼</button>
          <button id="match-close" title="סגור חיפוש בדף" aria-label="סגור">✕</button>
        </div>
        <div class="empty-state" id="welcome">
          <div style="font-size:1.1rem;font-weight:700">לא נטען קובץ ZIM</div>
          <div>בחר קובץ <code>.zim</code> כדי להתחיל. ניתן להוריד קבצי ZIM מ-<span dir="ltr">library.kiwix.org</span>.</div>
          <div>ניתן גם להוריד קבצים נבחרים דרך התוסף, בחלונית הייעודית ⬇ "מאגרים להורדה".</div>
        </div>
        <iframe id="article-frame" sandbox="allow-same-origin allow-popups" style="display:none"></iframe>
      </section>
    </main>

    <footer class="status" id="status"></footer>
  </div>

  <script>
    function hexToRgba(hex, alpha) {
      var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return 'rgba('+r+','+g+','+b+','+alpha+')';
    }
    function applyTheme(theme) {
      if (!theme || !theme.colorScheme) return;
      var cs = theme.colorScheme, root = document.documentElement;
      root.style.setProperty('--color-primary',                    cs.primary);
      root.style.setProperty('--color-on-primary',                 cs.onPrimary);
      root.style.setProperty('--color-secondary',                  cs.secondary);
      root.style.setProperty('--color-on-secondary',               cs.onSecondary);
      root.style.setProperty('--color-surface',                    cs.surface);
      root.style.setProperty('--color-on-surface',                 cs.onSurface);
      root.style.setProperty('--color-surface-container-highest',  cs.surfaceContainerHighest);
      root.style.setProperty('--color-error',                      cs.error);
      root.style.setProperty('--color-on-error',                   cs.onError);
      root.style.setProperty('--color-outline',                    cs.outline);
      root.style.setProperty('--color-primary-subtle',   hexToRgba(cs.primary, 0.12));
      root.style.setProperty('--color-secondary-subtle', hexToRgba(cs.secondary, 0.12));
      document.body.classList.toggle('dark-mode', theme.mode === 'dark');
      if (theme.typography) {
        root.style.setProperty('--font-main',       "'"+theme.typography.fontFamily+"', 'David', serif");
        root.style.setProperty('--font-size-base',  theme.typography.fontSize+'px');
        root.style.setProperty('--line-height',     String(theme.typography.lineHeight));
      }
    }
    Otzaria.on('plugin.boot',   function(p) { applyTheme(p.theme); });
    Otzaria.on('theme.changed', applyTheme);
  </script>

  <script src="js/libzim-wasm-source.js"></script>
  <script src="js/libzim-wasm-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
